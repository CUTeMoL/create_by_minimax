<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #eee;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }
    canvas {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 4px;
    }
    .info {
      color: #aaa;
      margin-top: 12px;
      font-size: 14px;
    }
    .score {
      color: #e94560;
      font-size: 18px;
      margin-top: 8px;
    }
    /* 暂停菜单样式 */
    .pause-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .pause-overlay.active {
      display: flex;
    }
    .pause-title {
      color: #fff;
      font-size: 32px;
      margin-bottom: 20px;
    }
    .pause-menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .pause-btn {
      padding: 12px 40px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .pause-btn:hover {
      transform: scale(1.05);
    }
    .pause-btn.continue {
      background: #4ecca3;
      color: #fff;
    }
    .pause-btn.restart {
      background: #e94560;
      color: #fff;
    }
    .high-score {
      color: #ffd700;
      font-size: 16px;
      margin-top: 16px;
    }
    .new-record {
      color: #ffd700;
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
      animation: pulse 0.5s infinite alternate;
    }
    @keyframes pulse {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>贪吃蛇</h1>
  <canvas id="c" width="400" height="400"></canvas>
  <div class="score">得分: <span id="s">0</span> | 最高分: <span id="hs">0</span></div>
  <div id="newRecord" class="new-record" style="display:none">新纪录!</div>
  <div class="info">方向键或 WASD 控制 | 空格键暂停</div>

  <!-- 暂停菜单 -->
  <div id="pauseOverlay" class="pause-overlay">
    <div class="pause-title">游戏暂停</div>
    <div class="pause-menu">
      <button class="pause-btn continue" onclick="continueGame()">继续</button>
      <button class="pause-btn restart" onclick="restartGame()">重新开始</button>
    </div>
    <div class="high-score">最高分: <span id="pauseHs">0</span></div>
  </div>

  <script>
    // ==================== 游戏配置 ====================
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('s');
    const highScoreEl = document.getElementById('hs');
    const newRecordEl = document.getElementById('newRecord');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const pauseHsEl = document.getElementById('pauseHs');

    const GRID = 20;                    // 网格大小（像素）
    const COLS = canvas.width / GRID;   // 列数 = 20
    const ROWS = canvas.height / GRID; // 行数 = 20

    // ==================== 游戏状态 ====================
    let snake = [{x: 10, y: 10}];      // 蛇身坐标数组
    let dir = {x: 1, y: 0};            // 当前移动方向
    let nextDir = {x: 1, y: 0};        // 下一帧方向（防止快速转向）
    let food = {x: 15, y: 10};         // 食物位置
    let score = 0;                     // 当前得分
    let paused = false;                // 暂停标志
    let gameRunning = true;            // 游戏运行标志
    let lastTime = 0;                  // 上次更新时间

    // 速度相关
    let baseInterval = 120;            // 基础移动间隔（毫秒）
    let interval = baseInterval;       // 当前移动间隔
    const minInterval = 50;            // 最快速度（毫秒）
    const speedStep = 5;               // 每5个食物加速量
    const speedDecrement = 5;          // 每次加速减少的毫秒数

    // 最高分相关
    let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
    highScoreEl.textContent = highScore;

    // 音效相关（Web Audio API）
    let audioCtx = null;

    /**
     * 初始化音频上下文（用户首次交互后创建）
     */
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    /**
     * 播放吃食物音效（上升音）
     */
    function playEatSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.1);
    }

    /**
     * 播放游戏结束音效（下降音）
     */
    function playGameOverSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    }

    /**
     * 播放新纪录音效（庆祝音）
     */
    function playNewRecordSound() {
      if (!audioCtx) return;
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.15);
        osc.start(audioCtx.currentTime + i * 0.1);
        osc.stop(audioCtx.currentTime + i * 0.1 + 0.15);
      });
    }

    /**
     * 初始化游戏
     */
    function init() {
      snake = [{x: 10, y: 10}];
      dir = {x: 1, y: 0};
      nextDir = {x: 1, y: 0};
      score = 0;
      paused = false;
      gameRunning = true;
      lastTime = 0;
      interval = baseInterval;
      newRecordEl.style.display = 'none';
      spawnFood();
      scoreEl.textContent = 0;
    }

    /**
     * 生成新食物（确保不在蛇身上）
     */
    function spawnFood() {
      do {
        food = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    /**
     * 绘制游戏画面
     */
    function draw() {
      // 清空画布
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 绘制网格线
      ctx.strokeStyle = '#1f2f50';
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * GRID, 0);
        ctx.lineTo(x * GRID, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * GRID);
        ctx.lineTo(canvas.width, y * GRID);
        ctx.stroke();
      }

      // 绘制食物（红色圆形）
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // 绘制蛇身
      snake.forEach((seg, i) => {
        if (i === 0) {
          // 蛇头：亮绿色
          ctx.fillStyle = '#4ecca3';
        } else {
          // 蛇身：深绿色
          ctx.fillStyle = '#3aa882';
        }
        ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
      });

      // 绘制暂停提示
      if (paused && gameRunning) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('已暂停 - 按空格继续', canvas.width/2, canvas.height/2);
      }

      // 绘制游戏结束提示
      if (!gameRunning) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('游戏结束!', canvas.width/2, canvas.height/2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '18px Arial';
        ctx.fillText('按 Enter 或 空格重新开始', canvas.width/2, canvas.height/2 + 20);
      }
    }

    /**
     * 更新游戏逻辑
     */
    function update() {
      // 应用下一方向
      dir = nextDir;

      // 计算新蛇头位置
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      // 撞墙检测
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        triggerGameOver();
        return;
      }

      // 撞自己检测
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        triggerGameOver();
        return;
      }

      // 添加新蛇头
      snake.unshift(head);

      // 吃食物检测
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        playEatSound();
        updateHighScore();
        spawnFood();
        // 难度递增：每5个食物加速
        if (score % 50 === 0 && interval > minInterval) {
          interval -= speedDecrement;
        }
      } else {
        // 没吃到食物，移除蛇尾（保持长度不变）
        snake.pop();
      }
    }

    /**
     * 更新最高分记录
     */
    function updateHighScore() {
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreEl.textContent = highScore;
        newRecordEl.style.display = 'block';
        playNewRecordSound();
      }
    }

    /**
     * 游戏结束处理
     */
    function triggerGameOver() {
      gameRunning = false;
      playGameOverSound();
      updateHighScore();
      draw();
    }

    /**
     * 主游戏循环
     */
    function loop(ts) {
      if (ts - lastTime >= interval) {
        lastTime = ts;
        if (!paused && gameRunning) {
          update();
        }
        draw();
      }
      requestAnimationFrame(loop);
    }

    /**
     * 继续游戏（从暂停菜单）
     */
    function continueGame() {
      initAudio();
      paused = false;
      pauseOverlay.classList.remove('active');
    }

    /**
     * 重新开始游戏（从暂停菜单）
     */
    function restartGame() {
      initAudio();
      pauseOverlay.classList.remove('active');
      init();
    }

    /**
     * 显示暂停菜单
     */
    function showPauseMenu() {
      paused = true;
      pauseHsEl.textContent = highScore;
      pauseOverlay.classList.add('active');
    }

    // ==================== 键盘事件处理 ====================
    document.addEventListener('keydown', e => {
      // 初始化音频（首次交互）
      initAudio();

      // 游戏结束时按 Enter 或 空格重新开始
      if (!gameRunning) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          init();
        }
        return;
      }

      switch(e.key) {
        case 'ArrowUp': case 'w': case 'W':
          if (dir.y !== 1) nextDir = {x:0, y:-1};
          break;
        case 'ArrowDown': case 's': case 'S':
          if (dir.y !== -1) nextDir = {x:0, y:1};
          break;
        case 'ArrowLeft': case 'a': case 'A':
          if (dir.x !== 1) nextDir = {x:-1, y:0};
          break;
        case 'ArrowRight': case 'd': case 'D':
          if (dir.x !== -1) nextDir = {x:1, y:0};
          break;
        case ' ':
          e.preventDefault();
          if (paused) {
            // 从暂停状态继续
            paused = false;
          } else {
            // 进入暂停菜单
            showPauseMenu();
          }
          break;
      }
    });

    // ==================== 启动游戏 ====================
    init();
    draw();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
